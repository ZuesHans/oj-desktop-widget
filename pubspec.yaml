name: oj_float
description: Windows floating desktop widget for OJ solved-count tracking.
publish_to: "none"
version: 0.1.3+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  html: ^0.15.4
  file_picker: ^8.1.7
  flutter_secure_storage: ^9.2.2
  launch_at_startup: ^0.3.1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  window_manager: ^0.4.2
  tray_manager: ^0.2.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.ico
    - assets/app_icon.png
